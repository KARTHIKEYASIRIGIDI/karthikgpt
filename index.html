<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karthik AI</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Marked.js -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    html, body {
      height: 100%;
    }
    pre {
      background: #111;
      color: #0f0;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
    }
  </style>
</head>
<body class="bg-gray-100 text-black dark:bg-gray-900 dark:text-white">

<div id="loading" class="fixed inset-0 flex items-center justify-center text-xl">
  Loading App...
</div>

<div id="app" class="hidden min-h-screen flex">

  <!-- Sidebar -->
  <div id="sidebar" class="fixed md:relative z-20 w-64 bg-white dark:bg-gray-800 border-r transform -translate-x-full md:translate-x-0 transition-transform duration-300 flex flex-col">
    <div class="p-4 flex justify-between items-center">
      <h2 class="font-bold text-lg">Karthik AI</h2>
      <button id="closeSidebar" class="md:hidden">✖</button>
    </div>

    <button id="newChat" class="m-2 p-2 bg-blue-500 text-white rounded">+ New Chat</button>

    <div id="chatList" class="flex-1 overflow-y-auto"></div>

    <div class="p-2 border-t space-y-2">
      <button id="settingsBtn" class="w-full bg-gray-200 dark:bg-gray-700 p-2 rounded">Settings</button>
      <button id="toggleTheme" class="w-full bg-gray-200 dark:bg-gray-700 p-2 rounded">Toggle Theme</button>
    </div>
  </div>

  <!-- Main -->
  <div class="flex-1 flex flex-col min-h-screen">

    <!-- Top Bar -->
    <div class="p-3 flex items-center border-b bg-white dark:bg-gray-800">
      <button id="openSidebar" class="md:hidden mr-2">☰</button>
      <h1 class="font-semibold">Karthik AI</h1>
    </div>

    <!-- Messages -->
    <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

    <!-- Input -->
    <div class="sticky bottom-0 bg-white dark:bg-gray-800 p-3 border-t">
      <div class="flex gap-2">
        <input id="input" class="flex-1 p-2 border rounded dark:bg-gray-700" placeholder="Ask something..." />
        <button id="send" class="bg-blue-500 text-white px-4 rounded">Send</button>
      </div>
    </div>

  </div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
  <div class="bg-white dark:bg-gray-800 p-4 rounded w-80 space-y-3">
    <h2 class="font-bold">Settings</h2>

    <input id="apiKey" type="password" placeholder="OpenRouter API Key" class="w-full p-2 border rounded" />
    <input id="model" placeholder="Model" class="w-full p-2 border rounded" />

    <textarea id="systemPrompt" placeholder="System Prompt" class="w-full p-2 border rounded"></textarea>

    <button id="saveSettings" class="w-full bg-blue-500 text-white p-2 rounded">Save</button>
  </div>
</div>

<script>
(function(){

const $ = id => document.getElementById(id);

// Init
let chats = JSON.parse(localStorage.getItem("chats") || "[]");
let currentChatId = localStorage.getItem("currentChatId") || null;

if (!chats.length) {
  createNewChat();
}

renderChats();
loadChat();

// Theme
if (localStorage.getItem("theme") === "dark") {
  document.documentElement.classList.add("dark");
}

// Sidebar toggle
$("openSidebar").onclick = () => $("sidebar").classList.remove("-translate-x-full");
$("closeSidebar").onclick = () => $("sidebar").classList.add("-translate-x-full");

// Theme toggle
$("toggleTheme").onclick = () => {
  document.documentElement.classList.toggle("dark");
  localStorage.setItem("theme", document.documentElement.classList.contains("dark") ? "dark" : "light");
};

// Settings
$("settingsBtn").onclick = () => {
  $("settingsModal").classList.remove("hidden");
  $("apiKey").value = localStorage.getItem("apiKey") || "";
  $("model").value = localStorage.getItem("model") || "deepseek/deepseek-r1:free";
  $("systemPrompt").value = getCurrentChat().systemPrompt || "";
};

$("saveSettings").onclick = () => {
  localStorage.setItem("apiKey", $("apiKey").value);
  localStorage.setItem("model", $("model").value);
  getCurrentChat().systemPrompt = $("systemPrompt").value;
  saveChats();
  $("settingsModal").classList.add("hidden");
};

// New chat
$("newChat").onclick = createNewChat;

// Send
$("send").onclick = sendMessage;
$("input").addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

function createNewChat(){
  const id = Date.now().toString();
  chats.unshift({ id, title: "New Chat", messages: [], systemPrompt: "" });
  currentChatId = id;
  saveChats();
  renderChats();
  loadChat();
}

function getCurrentChat(){
  return chats.find(c => c.id === currentChatId);
}

function renderChats(){
  $("chatList").innerHTML = "";
  chats.forEach(chat => {
    const div = document.createElement("div");
    div.className = "p-2 hover:bg-gray-200 dark:hover:bg-gray-700 cursor-pointer flex justify-between";
    div.innerHTML = `
      <span>${chat.title}</span>
      <span>
        <button data-id="${chat.id}" class="rename">✏</button>
        <button data-id="${chat.id}" class="delete">🗑</button>
      </span>
    `;
    div.onclick = () => {
      currentChatId = chat.id;
      saveChats();
      loadChat();
    };
    $("chatList").appendChild(div);
  });

  document.querySelectorAll(".delete").forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      chats = chats.filter(c => c.id !== btn.dataset.id);
      saveChats();
      renderChats();
      loadChat();
    };
  });

  document.querySelectorAll(".rename").forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const name = prompt("Rename chat:");
      if (name) {
        const c = chats.find(x => x.id === btn.dataset.id);
        c.title = name;
        saveChats();
        renderChats();
      }
    };
  });
}

function loadChat(){
  const chat = getCurrentChat();
  if (!chat) return;
  $("messages").innerHTML = "";
  chat.messages.forEach(renderMessage);
}

function renderMessage(msg){
  const div = document.createElement("div");
  div.className = msg.role === "user" ? "text-right" : "text-left";
  div.innerHTML = `<div class="inline-block p-2 rounded bg-gray-200 dark:bg-gray-700">${marked.parse(msg.content)}</div>`;
  $("messages").appendChild(div);
  $("messages").scrollTop = $("messages").scrollHeight;
}

async function sendMessage(){
  const input = $("input");
  const text = input.value.trim();
  if (!text) return;

  const chat = getCurrentChat();

  chat.messages.push({ role: "user", content: text });
  renderMessage({ role: "user", content: text });

  input.value = "";

  const aiMsg = { role: "assistant", content: "" };
  chat.messages.push(aiMsg);

  const div = document.createElement("div");
  div.className = "text-left";
  const bubble = document.createElement("div");
  bubble.className = "inline-block p-2 rounded bg-gray-200 dark:bg-gray-700";
  div.appendChild(bubble);
  $("messages").appendChild(div);

  try {
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + (localStorage.getItem("apiKey") || ""),
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: localStorage.getItem("model") || "deepseek/deepseek-r1:free",
        messages: [
          ...(chat.systemPrompt ? [{role:"system", content: chat.systemPrompt}] : []),
          ...chat.messages
        ],
        stream: true
      })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder("utf-8");

    while(true){
      const {done, value} = await reader.read();
      if(done) break;

      const chunk = decoder.decode(value);
      const lines = chunk.split("\n");

      for (let line of lines){
        if(line.startsWith("data:")){
          const data = line.replace("data:","").trim();
          if(data === "[DONE]") break;

          try {
            const json = JSON.parse(data);
            const token = json.choices?.[0]?.delta?.content || "";
            aiMsg.content += token;
            bubble.innerHTML = marked.parse(aiMsg.content);
            $("messages").scrollTop = $("messages").scrollHeight;
          } catch {}
        }
      }
    }

  } catch (err){
    bubble.innerHTML = "Error: " + err.message;
  }

  if (chat.messages.length === 1) {
    chat.title = text.slice(0, 20);
  }

  saveChats();
}

function saveChats(){
  localStorage.setItem("chats", JSON.stringify(chats));
  localStorage.setItem("currentChatId", currentChatId);
}

// Init done
$("loading").style.display = "none";
$("app").classList.remove("hidden");

})();
</script>

</body>
  </html>
