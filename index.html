<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karthik AI Ultra - Anime Edition</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #ff7eb9;
  --secondary: #7afcff;
  --bg-dark: #1a1a2e;
  --manga-border: #000;
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg-dark);
}

.anime-font { font-family: 'Fredoka One', cursive; }

.anime-card {
  border: 4px solid var(--manga-border);
  box-shadow: 6px 6px 0px var(--manga-border);
  background: white;
  color: black;
}

.glass-anime {
  backdrop-filter: blur(12px);
  background: rgba(255, 255, 255, 0.1);
  border: 2px solid rgba(255, 255, 255, 0.2);
  border-radius: 20px;
}

.bubble-user {
  background: #ff7eb9;
  color: white;
  border: 3px solid black;
  box-shadow: 4px 4px 0px black;
  border-radius: 20px 20px 0 20px;
}

.bubble-ai {
  background: white;
  color: black;
  border: 3px solid black;
  box-shadow: 4px 4px 0px black;
  border-radius: 20px 20px 20px 0;
}

@keyframes bop {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}
.bop { animation: bop 3s ease-in-out infinite; }

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; border: 2px solid black; }
</style>
</head>

<body class="text-white overflow-hidden">

<div id="loading" class="fixed inset-0 flex items-center justify-center anime-font text-3xl text-pink-400 z-50 bg-[#1a1a2e]">
  <div class="bop">LOADING...</div>
</div>

<div id="overlay" class="fixed inset-0 bg-black/60 z-20 hidden"></div>

<div id="app" class="hidden h-screen flex flex-col md:flex-row p-4 gap-4">

  <div id="sidebar" class="fixed md:relative z-30 w-72 h-[calc(100vh-2rem)] glass-anime transform -translate-x-[110%] md:translate-x-0 transition duration-300 flex flex-col p-4">
    <div class="text-2xl anime-font text-pink-400 mb-6 text-center">Karthik AI</div>
    <button id="newChat" class="anime-card p-3 mb-6 hover:translate-y-1 hover:shadow-none transition-all anime-font active:scale-95">
      + NEW CHAT
    </button>
    <div id="chatList" class="flex-1 overflow-y-auto space-y-3 pr-2"></div>
    <div class="mt-4 space-y-2">
      <button id="settingsBtn" class="w-full p-2 glass-anime hover:bg-white hover:text-black transition-colors active:scale-95">Settings</button>
    </div>
  </div>

  <div class="flex-1 flex flex-col glass-anime overflow-hidden relative">
    <div class="p-4 border-b border-white/10 flex items-center justify-between bg-black/20">
      <button id="openSidebar" class="md:hidden text-2xl p-2">☰</button>
      <div class="anime-font text-xl tracking-widest uppercase">System Core</div>
      <div class="h-8 w-8 rounded-full bg-pink-500 border-2 border-black bop"></div>
    </div>

    <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-8"></div>

    <div class="p-4 bg-black/20">
      <div class="flex gap-2 items-center bg-white rounded-2xl p-2 border-4 border-black shadow-[4px_4px_0px_black]">
        <input id="input" type="text" class="flex-1 bg-white outline-none p-2 text-black font-bold placeholder-gray-400" placeholder="Type your mission here..." />
        <button id="send" class="bg-pink-500 text-white px-4 py-2 rounded-xl border-2 border-black hover:bg-pink-600 active:scale-90 transition-all font-bold">
          SEND
        </button>
      </div>
    </div>
  </div>
</div>

<div id="settingsModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm">
  <div class="anime-card p-8 w-80 md:w-96 space-y-4">
    <h2 class="anime-font text-2xl mb-4 text-pink-500 text-center">Settings</h2>
    <input id="apiKey" type="password" placeholder="API Key" class="w-full p-3 border-2 border-black rounded-lg text-black bg-gray-50" />
    <input id="model" placeholder="Model" class="w-full p-3 border-2 border-black rounded-lg text-black bg-gray-50" />
    <textarea id="systemPrompt" placeholder="System Prompt" class="w-full p-3 border-2 border-black rounded-lg text-black h-24 bg-gray-50"></textarea>
    <div class="flex gap-2">
      <button id="saveSettings" class="flex-1 bg-cyan-400 p-3 border-2 border-black shadow-[3px_3px_0_black] font-bold active:translate-y-1">SAVE</button>
      <button id="closeSettings" class="flex-1 bg-gray-200 p-3 border-2 border-black shadow-[3px_3px_0_black] font-bold text-black active:translate-y-1">CLOSE</button>
    </div>
  </div>
</div>

<script>
(function(){
const $ = id => document.getElementById(id);
let chats = JSON.parse(localStorage.getItem("chats") || "[]");
let currentChatId = localStorage.getItem("currentChatId");

function save() {
  localStorage.setItem("chats", JSON.stringify(chats));
  localStorage.setItem("currentChatId", currentChatId);
}

function getChat() {
  return chats.find(c => c.id === currentChatId) || chats[0];
}

function createChat() {
  const id = Date.now().toString();
  chats.unshift({ id, title: "New Adventure", messages: [], systemPrompt: "" });
  currentChatId = id;
  save();
  renderChats();
  loadChat();
}

function renderChats() {
  $("chatList").innerHTML = "";
  chats.forEach(c => {
    const d = document.createElement("div");
    d.className = `p-3 mb-2 rounded-xl border-2 cursor-pointer transition-all ${c.id === currentChatId ? 'bg-pink-500 border-black text-white shadow-[3px_3px_0_black]' : 'border-white/20 hover:bg-white/10'}`;
    d.innerText = c.title;
    d.onclick = () => {
      currentChatId = c.id;
      save();
      renderChats();
      loadChat();
    };
    $("chatList").appendChild(d);
  });
}

function renderMsg(m) {
  const isUser = m.role === "user";
  const container = document.createElement("div");
  container.className = `flex ${isUser ? 'justify-end' : 'justify-start'} w-full mb-4`;
  const inner = document.createElement("div");
  inner.className = `max-w-[85%] p-4 ${isUser ? 'bubble-user' : 'bubble-ai'}`;
  inner.innerHTML = marked.parse(m.content);
  container.appendChild(inner);
  $("messages").appendChild(container);
  $("messages").scrollTop = $("messages").scrollHeight;
}

function loadChat() {
  $("messages").innerHTML = "";
  const chat = getChat();
  if (chat && chat.messages) chat.messages.forEach(m => renderMsg(m));
}

async function send() {
  const text = $("input").value.trim();
  if (!text) return;
  
  const chat = getChat();
  chat.messages.push({ role: "user", content: text });
  renderMsg({ role: "user", content: text });
  $("input").value = "";
  
  if (chat.title === "New Adventure") chat.title = text.substring(0, 20);

  const aiMsg = { role: "assistant", content: "" };
  chat.messages.push(aiMsg);
  const div = document.createElement("div");
  div.className = "flex justify-start w-full mb-4";
  const bubble = document.createElement("div");
  bubble.className = "max-w-[85%] p-4 bubble-ai";
  div.appendChild(bubble);
  $("messages").appendChild(div);

  try {
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + (localStorage.getItem("apiKey") || ""),
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: localStorage.getItem("model") || "deepseek/deepseek-r1:free",
        messages: chat.messages,
        stream: true
      })
    });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunks = decoder.decode(value).split("\n");
      for (const line of chunks) {
        if (line.startsWith("data: ")) {
          const data = line.slice(6);
          if (data === "[DONE]") continue;
          try {
            const json = JSON.parse(data);
            const t = json.choices[0].delta.content || "";
            aiMsg.content += t;
            bubble.innerHTML = marked.parse(aiMsg.content);
            $("messages").scrollTop = $("messages").scrollHeight;
          } catch(e) {}
        }
      }
    }
  } catch (e) { bubble.innerText = "Error!"; }
  save();
  renderChats();
}

// Logic to handle input focus and enter key
$("input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        send();
    }
});

$("openSidebar").onclick = () => {
    $("sidebar").classList.remove("-translate-x-[110%]");
    $("overlay").classList.remove("hidden");
};
$("overlay").onclick = () => {
    $("sidebar").classList.add("-translate-x-[110%]");
    $("overlay").classList.add("hidden");
};
$("newChat").onclick = createChat;
$("send").onclick = send;
$("settingsBtn").onclick = () => {
  $("apiKey").value = localStorage.getItem("apiKey") || "";
  $("model").value = localStorage.getItem("model") || "deepseek/deepseek-r1:free";
  $("settingsModal").classList.remove("hidden");
};
$("closeSettings").onclick = () => $("settingsModal").classList.add("hidden");
$("saveSettings").onclick = () => {
  localStorage.setItem("apiKey", $("apiKey").value);
  localStorage.setItem("model", $("model").value);
  $("settingsModal").classList.add("hidden");
};

// Bootstrap
if (chats.length === 0) createChat();
renderChats();
loadChat();
$("loading").classList.add("hidden");
$("app").classList.remove("hidden");
})();
</script>
</body>
</html>
